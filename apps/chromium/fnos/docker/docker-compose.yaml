services:
  chromium:
    image: ${DOCKER_MIRROR}docker.io/jlesage/chromium:v${VERSION}
    container_name: chromium
    ports:
      - "${TRIM_SERVICE_PORT}:5800"
    volumes:
      - ${TRIM_PKGVAR:?}/config:/config
      - ${TRIM_PKGVAR:?}/fonts:/usr/share/fonts
    environment:
      - USER_ID=${TRIM_UID}
      - GROUP_ID=${TRIM_GID}
      - TZ=Asia/Shanghai
      - LANG=zh_CN.UTF-8
      - ENABLE_CJK_FONT=1
      - DISPLAY_WIDTH=1280
      - DISPLAY_HEIGHT=720
      - KEEP_APP_RUNNING=1
      # VNC_PASSWORD is read from .env (written by wizard at install time).
      # When set, both noVNC web access and VNC client connections require auth.
      # Empty value preserves prior no-auth behavior (recommended only on isolated networks).
      - VNC_PASSWORD=${VNC_PASSWORD:-}
    shm_size: "2gb"
    restart: unless-stopped
