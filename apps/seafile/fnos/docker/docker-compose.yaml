services:
  db:
    image: ${DOCKER_MIRROR}docker.io/mariadb:10.11
    container_name: seafile-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${wizard_mysql_root_password:-seafile_root_please_change}
      - MYSQL_LOG_CONSOLE=true
      - MARIADB_AUTO_UPGRADE=1
    volumes:
      - ${TRIM_PKGVAR:?}/mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/healthcheck.sh --connect --mariadbupgrade --innodb_initialized || exit 1"]
      interval: 20s
      start_period: 30s
      timeout: 5s
      retries: 10

  memcached:
    image: ${DOCKER_MIRROR}docker.io/memcached:1.6-alpine
    container_name: seafile-memcached
    restart: unless-stopped
    entrypoint: memcached
    command: -m 256

  seafile:
    image: ${DOCKER_MIRROR}docker.io/seafileltd/seafile-mc:${VERSION}
    container_name: seafile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
    ports:
      - "${TRIM_SERVICE_PORT}:80"
    volumes:
      - ${TRIM_PKGVAR:?}/seafile-data:/shared
    environment:
      - SEAFILE_MYSQL_DB_HOST=db
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=seafile
      - SEAFILE_MYSQL_DB_PASSWORD=${wizard_mysql_password:-seafile_db_please_change}
      - INIT_SEAFILE_MYSQL_ROOT_PASSWORD=${wizard_mysql_root_password:-seafile_root_please_change}
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - SEAFILE_MYSQL_DB_SEAHUB_DB_NAME=seahub_db
      - INIT_SEAFILE_ADMIN_EMAIL=${wizard_admin_email:-admin@example.com}
      - INIT_SEAFILE_ADMIN_PASSWORD=${wizard_admin_password:-seafile_admin_please_change}
      - SEAFILE_SERVER_HOSTNAME=${wizard_server_hostname:-localhost:8002}
      - SEAFILE_SERVER_PROTOCOL=http
      - SITE_ROOT=/
      - TIME_ZONE=Asia/Shanghai
      - JWT_PRIVATE_KEY=${wizard_jwt_private_key:-fnos_seafile_jwt_private_key_change_me_0123456789}
      - NON_ROOT=false
      - SEAFILE_LOG_TO_STDOUT=false
      - ENABLE_GO_FILESERVER=true
      - ENABLE_SEADOC=false
      - CACHE_PROVIDER=memcached
      - MEMCACHED_HOST=memcached
      - MEMCACHED_PORT=11211
      - ENABLE_NOTIFICATION_SERVER=false
      - MD_FILE_COUNT_LIMIT=100000
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
